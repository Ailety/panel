name: zh-build

on:
  push:
    branches:
      - zh-cn-complete

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        with:
          version: 11

      - name: install
        run: |
          cd frontend
          pnpm install

      - name: build translations
        run: |
          cd frontend
          pnpm build:translations

      - name: build frontend
        run: |
          cd frontend
          pnpm build
